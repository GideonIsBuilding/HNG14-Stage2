services:
  redis:
    image: redis:7-alpine
    container_name: redis_service
    networks:
      - app_network
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Redis password must be set}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?Redis password must be set}
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - ${REDIS_PASSWORD:?Redis password must be set}
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: unless-stopped
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api_service
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST:?Redis host must be set}
      - REDIS_PORT=${REDIS_PORT:?Redis port must be set}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Redis password must be set}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - /venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: unless-stopped
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker_service
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        - CMD
        - /venv/bin/python
        - -c
        - "import redis, os; redis.Redis(host=os.getenv('REDIS_HOST', 'localhost'), port=int(os.getenv('REDIS_PORT', 6379)), password=os.getenv('REDIS_PASSWORD')).ping()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: unless-stopped
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_service
    networks:
      - app_network
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=${API_URL}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:3000/
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: unless-stopped
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
    name: app_network
